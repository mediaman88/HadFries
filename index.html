    function uploadToCloudinary(file){
      return new Promise(function(resolve,reject){
        var fd = new FormData();
        fd.append("file", file);
        fd.append("upload_preset", CLOUDINARY_PRESET);
        fd.append("folder", "hadfries");

        fetch("https://api.cloudinary.com/v1_1/" + CLOUDINARY_CLOUD + "/image/upload", {
          method: "POST",
          body: fd

        .then(function(r){ return r.json(); })
        .then(function(d){
          if(d.secure_url) resolve(d.secure_url);
          else reject(new Error("Upload failed"));
        })
        .catch(reject);
      });
    }

    function parseElement(el){
      if(!el || !el.location) return null;

      var lat = el.location.latitude;
      var lng = el.location.longitude;
      if(lat == null || lng == null) return null;

      var comps = el.addressComponents || [];

      function fc(type){
        for(var i=0;i<comps.length;i++){
          if((comps[i].types || []).indexOf(type) !== -1){
            return comps[i].longText || comps[i].shortText || "";
          }
        }

    function haversine(lat1,lon1,lat2,lon2){
      var R=3958.8;
      var dLat=(lat2-lat1)*Math.PI/180;
      var dLon=(lon2-lon1)*Math.PI/180;
      var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

              var marker=view.getUint16(offset);

              if(marker===0xFFE1){
                var exifStr=String.fromCharCode.apply(null,new Uint8Array(buf,offset+4,6));
                if(exifStr.indexOf("Exif")===0){
                  var to=offset+10,le=view.getUint16(to)===0x4949;
                  var ifd0=to+view.getUint32(to+4,le),cnt=view.getUint16(ifd0,le),gpsOff=null;

                  for(var i=0;i<cnt;i++){
                    var eo=ifd0+2+i*12;
                    if(view.getUint16(eo,le)===0x8825) gpsOff=to+view.getUint32(eo+8,le);
                  }

                  if(!gpsOff){resolve(null);return;}

                  var gc=view.getUint16(gpsOff,le),gps={};

                  for(var j=0;j<gc;j++){
                    var e2=gpsOff+2+j*12,tag=view.getUint16(e2,le),vo=to+view.getUint32(e2+8,le);
                    var rat=function(o){return view.getUint32(o,le)/view.getUint32(o+4,le);};
                    if(tag===1) gps.latRef=String.fromCharCode(view.getUint8(e2+8));
                    if(tag===2) gps.lat=[rat(vo),rat(vo+8),rat(vo+16)];
                    if(tag===3) gps.lngRef=String.fromCharCode(view.getUint8(e2+8));
                    if(tag===4) gps.lng=[rat(vo),rat(vo+8),rat(vo+16)];
                  }

                  if(gps.lat && gps.lng){
                    var dms=function(arr){return arr[0]+arr[1]/60+arr[2]/3600;};
                    var lat=dms(gps.lat); if(gps.latRef==="S") lat=-lat;
                    var lng=dms(gps.lng); if(gps.lngRef==="W") lng=-lng;
                    resolve({lat:lat,lng:lng});
                  } else {
                    resolve(null);
                  }
                } else {
                  resolve(null);
                }
                return;
              }

              if((marker&0xFF00)!==0xFF00) break;
              offset+=2+view.getUint16(offset+2);
            }

            resolve(null);
          }catch(err){
            resolve(null);
          }
        };

        reader.readAsArrayBuffer(file);
      });
    }

        ),

        photoResult && !checkinUploading && h("div",{className:"hf-modal-overlay",onClick:function(){setPhotoResult(null);}},
          h("div",{className:"hf-modal",onClick:function(e){e.stopPropagation();}},
            photoResult.error
              ? h(React.Fragment,null,
                  h("div",{className:"hf-modal-icon"},"😕"),
                  h("div",{className:"hf-modal-title"},"Couldn't Find Location"),
                  h("div",{className:"hf-modal-desc"},photoResult.error),
                  h("button",{className:"hf-btn-red",onClick:function(){setPhotoResult(null);}},"OK")
                )
              : h(React.Fragment,null,
                  h("div",{className:"hf-modal-icon"},"📍"),
                  h("div",{className:"hf-modal-title"},"Found It!"),
                  h("div",{className:"hf-modal-desc"},"Your photo was taken near this McDonald's:"),
                  h("div",{className:"hf-modal-loc"},
                    h("div",{className:"hf-modal-loc-name"},photoResult.loc.name),
                    h("div",{className:"hf-modal-loc-addr"},[photoResult.loc.address,photoResult.loc.city].filter(Boolean).join(" · ")||"McDonald's location"),
                    h("div",{className:"hf-modal-loc-dist"},"📍 "+fmtDist(photoResult.loc.dist)+" from photo GPS")
                  ),
                  checkins[photoResult.loc.id]
                    ? h(React.Fragment,null,
                        h("div",{style:{color:"#DA0023",fontFamily:"'Archivo Black',sans-serif",fontSize:"0.85rem",marginBottom:14}},"🍟 Already checked in!"),
                        h("button",{className:"hf-btn-ghost",onClick:function(){setPhotoResult(null);}},"Close")
                      )
                    : h("div",{className:"hf-modal-btns"},
                        h("button",{className:"hf-btn-ghost",onClick:function(){setPhotoResult(null);}},"Cancel"),
                        h("button",{className:"hf-btn-red",onClick:function(){confirmPhotoCheckin(photoResult.loc,photoResult.file);}},"✓ Check In + Save Photo!")
                      )
                )
          )
        ),

        checkinModal && !checkinUploading && h("div",{className:"hf-modal-overlay",onClick:function(){setCheckinModal(null);}},
          h("div",{className:"hf-modal",onClick:function(e){e.stopPropagation();}},
            h("div",{className:"hf-modal-icon"},"📍"),
            h("div",{className:"hf-modal-title"},"Had Fries Here!"),
            h("div",{className:"hf-modal-loc"},
              h("div",{className:"hf-modal-loc-name"},checkinModal.loc.name),
              h("div",{className:"hf-modal-loc-addr"},[checkinModal.loc.address,checkinModal.loc.city].filter(Boolean).join(" · ")||"McDonald's location")
            ),
            h("div",{className:"hf-modal-desc",style:{marginBottom:12}},"Add a photo to remember this visit!"),

            checkinPhotoPreview
              ? h(React.Fragment,null,
                  h("img",{className:"hf-photo-preview",src:checkinPhotoPreview,alt:"preview"}),
                  h("button",{
                    style:{fontSize:"0.72rem",color:"#888",background:"none",border:"none",cursor:"pointer",marginBottom:12},
                    onClick:function(){setCheckinPhoto(null);setCheckinPhotoPreview(null);}
                  },"✕ Remove photo")
                )
              : h("div",{className:"hf-photo-upload-area",onClick:function(){if(checkinPhotoRef.current) checkinPhotoRef.current.click();}},
                  h("div",{style:{fontSize:"2rem",marginBottom:6}},"📷"),
                  h("div",{style:{fontSize:"0.82rem",fontWeight:700,color:"#555"}},"Tap to add a photo"),
                  h("div",{style:{fontSize:"0.72rem",color:"#aaa",marginTop:4}},"Optional — you can skip")
                ),

            h("input",{ref:checkinPhotoRef,type:"file",accept:"image/*",style:{display:"none"},onChange:handleCheckinPhotoSelect}),

            h("div",{className:"hf-modal-btns"},
              h("button",{className:"hf-btn-ghost",onClick:function(){setCheckinModal(null);}},"Cancel"),
              checkinPhotoPreview
                ? h("button",{className:"hf-btn-red",onClick:function(){confirmCheckin(false);}},"✓ Check In + Upload Photo!")
                : h(React.Fragment,null,
                    h("button",{
                      style:{background:"#27251F",color:"#FFC72C",border:"3px solid #27251F",borderRadius:10,padding:"10px 16px",fontFamily:"'Archivo Black',sans-serif",fontSize:"0.78rem",cursor:"pointer"},
                      onClick:function(){if(checkinPhotoRef.current) checkinPhotoRef.current.click();}
                    },"Add Photo"),
                    h("button",{className:"hf-btn-red",onClick:function(){confirmCheckin(true);}},"Skip & Check In")
                  )
            )
          )
        ),

        loading && geoStatus==="ok" && (view==="nearby"||view==="all") && h("div",{className:"hf-loading",style:{marginTop:40}},
          h("div",{className:"hf-spinner"}),
          h("div",{className:"hf-loading-txt"},"Loading nearby McDonald's...")
        ),

        loadError && !loading && h("div",{style:{maxWidth:900,margin:"20px auto",padding:"0 16px"}},
          h("div",{style:{background:"white",border:"3px solid #DA0023",borderRadius:12,padding:20,textAlign:"center"}},
            h("div",{style:{fontSize:"1.5rem",marginBottom:8}},"⚠️"),
            h("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"0.9rem",marginBottom:6}},"Couldn't load locations"),
            h("div",{style:{fontSize:"0.8rem",color:"#666",marginBottom:14}},loadError),
            h("button",{className:"hf-btn-red",onClick:function(){if(userPos) fetchLocations(userPos.lat,userPos.lng,radius); else requestGeo();}},"Retry")
          )
        ),

        view==="nearby" && geoStatus==="ok" && !loading && !loadError && h(React.Fragment,null,
          filtered.length>0 && h("div",{className:"hf-result-count"},"Showing "+filtered.length+" closest location"+(filtered.length!==1?"s":"")),
          h("div",{className:"hf-grid"},
            filtered.length===0
              ? h("div",{className:"hf-empty"},"No locations found nearby 🍟")
              : filtered.map(function(loc){
                  var isChecked=!!checkins[loc.id];
                  return h("div",{key:loc.id,className:"hf-card"+(isChecked?" checked":"")+(celebrating===loc.id?" celebrating":"")},
                    isChecked && h("div",{className:"hf-stamp"},"🍟"),
                    h("div",{className:"hf-card-top"},
                      h("div",{style:{flexShrink:0,display:"flex",alignItems:"center"}},h(Arches,{width:28})),
                      h("div",{className:"hf-card-loc-info"},
                        h("div",{className:"hf-card-name"},loc.name),
                        h("div",{className:"hf-card-addr"},loc.address||loc.city||"McDonald's location")
                      ),
                      loc.dist!==null && h("div",{className:"hf-dist-pill"},fmtDist(loc.dist))
                    ),
                    h("div",{className:"hf-card-bottom"},
                      h("div",{className:"hf-card-meta"},
                        loc.city && h("div",null,loc.city),
                        isChecked && checkins[loc.id] && checkins[loc.id].photo && h("div",{style:{color:"#4ade80",fontSize:"0.67rem"}},"📷 Photo saved")
                      ),
                      h("button",{className:"hf-checkin-btn "+(isChecked?"yes":"no"),onClick:function(){openCheckinModal(loc);}},
                        isChecked ? "✓ Had Fries!" : "Had Fries?"
                      )
                    )
                  );
                })
          )
        ),

        view==="all" && geoStatus==="ok" && !loading && !loadError && h("div",{className:"hf-list"},
          filtered.length===0
            ? h("div",{style:{textAlign:"center",padding:40,fontFamily:"'Archivo Black',sans-serif",opacity:0.5}},"No locations found 🍟")
            : filtered.map(function(loc){
                var isChecked=!!checkins[loc.id];
                return h("div",{key:loc.id,className:"hf-list-row"+(isChecked?" checked":"")},
                  h(ArchesOutline,{width:22}),
                  h("div",{style:{flex:1,overflow:"hidden"}},
                    h("div",{className:"hf-list-name"},loc.name+(isChecked?" 🍟":"")),
                    h("div",{className:"hf-list-sub"},[loc.address,loc.city].filter(Boolean).join(" · ")||"McDonald's")
                  ),
                  loc.dist!==null && h("div",{style:{fontSize:"0.7rem",fontWeight:700,color:"#DA0023",whiteSpace:"nowrap"}},fmtDist(loc.dist)),
                  h("button",{className:"hf-checkin-btn "+(isChecked?"yes":"no"),style:{fontSize:"0.68rem",padding:"6px 11px"},onClick:function(){openCheckinModal(loc);}},
                    isChecked ? "✓ Done" : "+ Check In"
                  )
                );
              })
        ),

        view==="stats" && h("div",{className:"hf-stats"},
          h("div",{className:"hf-stats-hero"},
            h("div",{style:{fontSize:"0.75rem",color:"rgba(255,255,255,0.7)",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:4}},
              authUser.user_metadata&&authUser.user_metadata.full_name ? authUser.user_metadata.full_name+"'s Stats" : "Your Stats"
            ),
            h("div",{className:"hf-stats-big"},totalCheckins),
            h("div",{className:"hf-stats-tag"},totalCheckins===0?"Go get some fries!":totalCheckins===1?"Location conquered":"Locations conquered"),
            h("div",{className:"hf-stats-rank"},h("span",{className:"hf-rank-chip"},currentLevel.icon+" "+currentLevel.label))
          ),

          h("div",{className:"hf-progress-wrap"},
            h("div",{className:"hf-progress-title"},"🏆 Level Progress"),
            LEVELS.map(function(lvl,idx){
              var done=totalCheckins>lvl.max && lvl.max!==999;
              var current=idx===currentLevelIdx;
              var pct=0;

              if(done) pct=100;
              else if(current){
                if(lvl.max===999) pct=Math.min(100,Math.round((totalCheckins-lvl.min)/10*100));
                else pct=Math.round((totalCheckins-lvl.min)/(lvl.max-lvl.min+1)*100);
              }

              var rangeLabel=lvl.max===999 ? "112+" : (lvl.min===0 ? "0" : lvl.min+"-"+lvl.max);

              return h("div",{key:lvl.label,className:"hf-level-row"+(current?" current":"")+(done?" done":"")},
                h("div",{className:"hf-level-icon"},lvl.icon),
                h("div",{className:"hf-level-info"},
                  h("div",{className:"hf-level-name"},lvl.label),
                  h("div",{className:"hf-level-range"},
                    rangeLabel+" check-ins"+(current ? " • "+totalCheckins+(lvl.max!==999 ? " / "+lvl.max : " check-ins so far!") : "")
                  ),
                  h("div",{className:"hf-level-bar-bg"},
                    h("div",{className:"hf-level-bar-fill",style:{width:pct+"%"}})
                  )
                ),
                h("div",{className:"hf-level-check"},done?"✅":(current?"📍":""))
              );
            })
          ),

          h("div",{className:"hf-sgrid"},
            [
              {val:totalCheckins,lbl:"Check-ins"},
              {val:visitedCountries.size,lbl:"Countries"},
              {val:totalCheckins>0?Math.round((Date.now()-new Date(Object.values(checkins).sort(function(a,b){return new Date(a.date)-new Date(b.date);})[0].date).getTime())/86400000):0,lbl:"Days Active"},
              {val:currentLevel.icon,lbl:currentLevel.label}
            ].map(function(sv){
              return h("div",{key:sv.lbl,className:"hf-scard"},
                h("div",{className:"hf-sval"},sv.val),
                h("div",{className:"hf-slbl"},sv.lbl)
              );
            })
          ),

          totalCheckins>0
            ? h(React.Fragment,null,
                h("div",{className:"hf-trail-title"},"🍟 Your Fry Trail"),
                h("div",{className:"hf-trail"},
                  Object.entries(checkins).slice().reverse().map(function(entry){
                    var id=entry[0],c=entry[1];
                    var countryObj=MCDONALDS_COUNTRIES.find(function(x){return x.name===c.country;});
                    var flag=countryObj?countryFlag(countryObj.code):"";

                    return h("div",{key:id,className:"hf-trail-row"},
                      c.photo
                        ? h("img",{className:"hf-trail-thumb",src:c.photo,alt:"visit",onClick:function(){setLightboxUrl(c.photo);}})
                        : h("div",{className:"hf-trail-thumb-empty"},"🍟"),
                      h("div",{className:"hf-trail-info"},
                        h("div",{className:"hf-trail-name"},c.name||"McDonald's"),
                        h("div",{className:"hf-trail-loc"},[c.address,c.city].filter(Boolean).join(" · ")||"—"),
                        c.country && h("div",{className:"hf-trail-country"},flag ? (flag+" "+c.country) : c.country)
                      ),
                      h("div",{className:"hf-trail-date"},new Date(c.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}))
                    );
                  })
                )
              )
            : h("div",{style:{background:"white",border:"3px solid #27251F",borderRadius:12,padding:32,textAlign:"center"}},
                h("div",{style:{fontSize:"3rem",marginBottom:10}},"🍟"),
                h("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"1rem"}},"No check-ins yet!"),
                h("div",{style:{color:"#888",fontSize:"0.82rem",marginTop:6,fontWeight:600}},"Head to Nearby to start your fry journey.")
              ),

          h("div",{style:{marginTop:24,padding:"12px 16px",background:"rgba(0,0,0,0.08)",borderRadius:8,fontSize:"0.62rem",color:"rgba(39,37,31,0.55)",fontWeight:600,lineHeight:1.6,textAlign:"center"}},
            "Had Fries is an unofficial personal family app not affiliated with McDonald's Corporation. The McDonald's name and Golden Arches are registered trademarks of McDonald's Corporation."
          )
        ),

        view==="world" && h("div",{style:{maxWidth:900,margin:"0 auto",padding:"16px"}},
          h("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"0.85rem",letterSpacing:2,textTransform:"uppercase",marginBottom:4}},"🌍 McDonald's Countries"),
          h("div",{style:{fontSize:"0.75rem",color:"#27251F",opacity:0.6,fontWeight:700,marginBottom:12}},
            visitedCountries.size+" of "+MCDONALDS_COUNTRIES.length+" countries visited"
          ),
          h("div",{className:"hf-countries-grid"},
            MCDONALDS_COUNTRIES.map(function(c){
              var visited=visitedCountries.has(c.name);
              return h("div",{key:c.code,className:"hf-country-row"+(visited?" visited":"")},
                h("div",{className:"hf-country-flag"},countryFlag(c.code)),
                h("div",{className:"hf-country-name"},c.name),
                visited && h("div",{className:"hf-country-check"},"🍟")
              );
            })
          )
        ),

        lightboxUrl && h("div",{className:"hf-lightbox",onClick:function(){setLightboxUrl(null);}},
          h("span",{className:"hf-lightbox-close"},"×"),
          h("img",{src:lightboxUrl,alt:"full photo",onClick:function(e){e.stopPropagation();}})
        ),

        h("div",{className:"hf-toast"+(toast?" show":"")+(toast&&toast.type==="remove"?" remove":"")},toast&&toast.msg)
      );
    }

    var root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(HadFries,null));
  </script>
</body>
</html>
