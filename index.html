    .hf-search:focus{border-color:#DA0023}
    .hf-select{padding:9px 12px;border:3px solid #27251F;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;background:white;outline:none;cursor:pointer}

    .hf-modal-icon{font-size:3rem;margin-bottom:12px}
    .hf-modal-title{font-family:'Archivo Black',sans-serif;font-size:1.1rem;margin-bottom:8px}
    .hf-modal-desc{color:#666;font-size:0.82rem;font-weight:600;margin-bottom:20px;line-height:1.6}
    .hf-modal-loc{background:#FFF8E7;border:2px solid #FFC72C;border-radius:10px;padding:12px;margin-bottom:18px;text-align:left}

    .hf-google-btn svg{width:20px;height:20px;flex-shrink:0}
    .hf-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .hf-input,.hf-textarea{width:100%;padding:10px 12px;border:3px solid #27251F;border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;background:white;outline:none}
    .hf-textarea{min-height:88px;resize:vertical}
    .hf-input:focus,.hf-textarea:focus{border-color:#DA0023}
    .hf-field-label{display:block;text-align:left;font-size:0.72rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#666;margin-bottom:6px}
    .hf-section-note{max-width:900px;margin:10px auto 0;padding:0 16px;font-size:0.7rem;font-weight:700;color:#27251F;opacity:0.65}
    @media(max-width:600px){

      .hf-stats-big{font-size:3.5rem}
      .hf-form-grid{grid-template-columns:1fr}
    }
  </style>

    function haversine(lat1,lon1,lat2,lon2){
      var R=3958.8;
      var dLat=(lat2-lat1)*Math.PI/180;
      var dLon=(lon2-lon1)*Math.PI/180;
      var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
      return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }

          if(!m) return null;

              if(marker===0xFFE1){

                  var cnt=view.getUint16(ifd0,le);
                  var gpsOff=null;
                  var exifIfdOff=null;
                  var takenAt=null;

                  for(var i=0;i<cnt;i++){
                    var eo=ifd0+2+i*12;
                    var tag=view.getUint16(eo,le);
                    if(tag===0x8825) gpsOff=to+view.getUint32(eo+8,le);
                    if(tag===0x8769) exifIfdOff=to+view.getUint32(eo+8,le);

                        var exifValOffset = exifCount<=4 ? (ee+8) : (to+view.getUint32(ee+8,le));
                        var parsed = parseExifDate(readAscii(view, exifValOffset, exifCount));
                        if(parsed){
                          takenAt = parsed;
                          break;
                        }
                      }
                    }
                  }

                  if(!gpsOff){
                    resolve(takenAt ? {lat:null,lng:null,takenAt:takenAt} : null);
                    return;
                  }

                  var gc=view.getUint16(gpsOff,le), gps={takenAt:takenAt};

                  for(var j=0;j<gc;j++){
                    var e2=gpsOff+2+j*12, tag2=view.getUint16(e2,le), vo=to+view.getUint32(e2+8,le);
                    var rat=function(o){return view.getUint32(o,le)/view.getUint32(o+4,le);};
                    if(tag2===1) gps.latRef=String.fromCharCode(view.getUint8(e2+8));
                    if(tag2===2) gps.lat=[rat(vo),rat(vo+8),rat(vo+16)];
                    if(tag2===3) gps.lngRef=String.fromCharCode(view.getUint8(e2+8));
                    if(tag2===4) gps.lng=[rat(vo),rat(vo+8),rat(vo+16)];
                  }

                  if(gps.lat && gps.lng){
                    var dms=function(arr){return arr[0]+arr[1]/60+arr[2]/3600;};
                    var lat=dms(gps.lat); if(gps.latRef==="S") lat=-lat;
                    var lng=dms(gps.lng); if(gps.lngRef==="W") lng=-lng;
                    resolve({lat:lat,lng:lng,takenAt:takenAt||null});
                  }else{
                    resolve(takenAt ? {lat:null,lng:null,takenAt:takenAt} : null);
                  }
                }else{
                  resolve(null);
                }
                return;
              }

              if((marker&0xFF00)!==0xFF00) break;
              offset += 2 + view.getUint16(offset+2);
            }

            resolve(null);
          }catch(err){
            resolve(null);
          }
        };

        reader.readAsArrayBuffer(file);
      });
    }

      function handlePhotoUpload(e){
        var file=e.target.files&&e.target.files[0];
        if(!file) return;

        setPhotoProcessing(true);
        setPhotoResult(null);

        var capturedFile=file;

        readExifGPS(file).then(function(gps){
          if(!gps || gps.lat == null || gps.lng == null){
            setPhotoResult({error:"No GPS data found."});
            setPhotoProcessing(false);
            return;
          }

          fetch("/api/overpass?lat="+encodeURIComponent(gps.lat)+"&lng="+encodeURIComponent(gps.lng)+"&radius=2")
            .then(function(r){
              return r.text().then(function(t){
                if(!r.ok) throw new Error(t||"Error");
                try{return JSON.parse(t);}catch(e){throw new Error("Invalid response");}
              });
            })
            .then(function(data){
              var locs=(data.places||[]).map(parseElement).filter(Boolean);
              if(!locs.length){
                setPhotoResult({error:"No McDonald's found near photo location."});
                setPhotoProcessing(false);
                return;
              }

              var closest=locs
                .map(function(l){return Object.assign({},l,{dist:haversine(gps.lat,gps.lng,l.lat,l.lng)});})
                .sort(function(a,b){return a.dist-b.dist;})[0];

              setPhotoResult({loc:closest,gps:gps,file:capturedFile});
              setPhotoProcessing(false);
            })
            .catch(function(e){
              setPhotoResult({error:e.message||"Could not look up location."});
              setPhotoProcessing(false);
            });

          e.target.value="";
        });
      }

                          (detail.price_usd ? "💵 $" + Number(detail.price_usd).toFixed(2) : "")
                        ),
                        detail.notes ? h("div",{className:"hf-trail-notes"},detail.notes) : null
                      ),
                      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"8px",flexShrink:0}},
                        h("div",{className:"hf-trail-date"},
                          new Date(c.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
                        ),
                        h("button",{
                          className:"hf-checkin-btn yes",
                          style:{fontSize:"0.65rem",padding:"6px 10px"},
                          onClick:function(){
                            openVisitModal({
                              id:id,
                              name:c.name||"McDonald's",
                              address:c.address||"",
                              city:c.city||"",
                              country:c.country||"",
                              lat:null,
                              lng:null
                            });
                          }
                        },"Edit")
                      )
                    );
                  })
                )
              )
            : h("div",{style:{background:"white",border:"3px solid #27251F",borderRadius:12,padding:32,textAlign:"center"}},
                h("div",{style:{fontSize:"3rem",marginBottom:10}},"🍟"),
                h("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"1rem"}},"No check-ins yet!"),
                h("div",{style:{color:"#888",fontSize:"0.82rem",marginTop:6,fontWeight:600}},"Head to Nearby to start your fry journey.")
              ),

          h("div",{style:{marginTop:24,padding:"12px 16px",background:"rgba(0,0,0,0.08)",borderRadius:8,fontSize:"0.62rem",color:"rgba(39,37,31,0.55)",fontWeight:600,lineHeight:1.6,textAlign:"center"}},
            "Levels are based on countries visited. Check-ins remain separate. Visit ratings, price, and notes are stored locally in this browser."
          )
        ),

        view==="world" && h("div",{style:{maxWidth:900,margin:"0 auto",padding:"16px"}},
          h("div",{style:{fontFamily:"'Archivo Black',sans-serif",fontSize:"0.85rem",letterSpacing:2,textTransform:"uppercase",marginBottom:4}},"🌍 McDonald's Countries"),
          h("div",{style:{fontSize:"0.75rem",color:"#27251F",opacity:0.6,fontWeight:700,marginBottom:12}},
            totalCountriesVisited+" of "+COUNTRY_COUNTS.length+" countries / territories visited"
          ),
          h("div",{className:"hf-countries-grid"},
            COUNTRY_COUNTS.map(function(c){
              var visited=visitedCountries.has(c.name);
              return h("div",{key:c.code+"-"+c.name,className:"hf-country-row"+(visited?" visited":"")},
                h("div",{className:"hf-country-flag"},countryFlag(c.code)),
                h("div",{className:"hf-country-name"},c.name),
                h("div",{className:"hf-country-count"},c.count),
                visited && h("div",{className:"hf-country-check"},"🍟")
              );
            })
          )
        ),

        lightboxUrl && h("div",{className:"hf-lightbox",onClick:function(){setLightboxUrl(null);}},
          h("span",{className:"hf-lightbox-close"},"×"),
          h("img",{src:lightboxUrl,alt:"full photo",onClick:function(e){e.stopPropagation();}})
        ),

        h("div",{className:"hf-toast"+(toast?" show":"")+(toast&&toast.type==="remove"?" remove":"")},toast&&toast.msg)
      );
    }

    var root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(HadFries,null));
  </script>
</body>
</html>
