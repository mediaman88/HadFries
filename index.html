<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Had Fries</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{font-family:'Nunito',sans-serif;background:#FFC72C;margin:0}
.header{background:#DA0023;color:white;padding:14px;font-family:'Archivo Black'}
.controls{padding:14px;background:#FFC72C;border-bottom:3px solid #27251F}
.search{width:60%;padding:10px;border:3px solid #27251F;border-radius:8px}
button{padding:10px 16px;border:3px solid #27251F;border-radius:8px;background:#FFC72C;font-weight:700;cursor:pointer}
.grid{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:white;border:3px solid #27251F;border-radius:10px;padding:12px}
</style>

</head>
<body>

<div id="root"></div>

<script>

var h = React.createElement;

function haversine(a,b,c,d){
var R=3958.8
var dLat=(c-a)*Math.PI/180
var dLon=(d-b)*Math.PI/180
var q=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2)
return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))
}

function HadFries(){

var s=React.useState
var pos=s(null)
var userPos=pos[0]
var setUserPos=pos[1]

var l=s([])
var locations=l[0]
var setLocations=l[1]

var q=s("")
var search=q[0]
var setSearch=q[1]

var loading=s(false)
var isLoading=loading[0]
var setLoading=loading[1]

function requestGeo(){

navigator.geolocation.getCurrentPosition(function(p){

setUserPos({
lat:p.coords.latitude,
lng:p.coords.longitude
})

})

}

function fetchLocations(lat,lng,radius){

setLoading(true)

fetch("/api/overpass?lat="+lat+"&lng="+lng+"&radius="+radius)
.then(r=>r.json())
.then(data=>{

var locs=(data.places||[]).map(function(p){

return{
id:p.id,
name:p.displayName.text,
address:p.formattedAddress,
lat:p.location.latitude,
lng:p.location.longitude
}

})

setLocations(locs)
setLoading(false)

})

}

React.useEffect(function(){

if(!userPos)return
fetchLocations(userPos.lat,userPos.lng,25)

},[userPos])

var filtered=locations.filter(function(l){

if(!search)return true
return l.name.toLowerCase().includes(search.toLowerCase()) || l.address.toLowerCase().includes(search.toLowerCase())

})

return h("div",null,

h("div",{className:"header"},"Had Fries"),

h("div",{className:"controls"},

h("button",{onClick:requestGeo},"Use My Location"),

h("input",{
className:"search",
placeholder:"Search address or name",
value:search,
onChange:e=>setSearch(e.target.value)
})

),

isLoading && h("div",{style:{padding:20}},"Loading McDonald's locations..."),

h("div",{className:"grid"},

filtered.map(function(l){

var dist=userPos? haversine(userPos.lat,userPos.lng,l.lat,l.lng).toFixed(2)+" mi": ""

return h("div",{className:"card",key:l.id},

h("div",{style:{fontWeight:900}},l.name),
h("div",null,l.address),
h("div",{style:{marginTop:6,fontSize:12}},dist)

)

})

)

)

}

ReactDOM.createRoot(document.getElementById("root")).render(h(HadFries))

</script>

</body>
</html>
