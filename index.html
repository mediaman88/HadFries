const STORAGE_KEY = "hadfries-checkins-v2";
const loadCheckins = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; } };
const saveCheckins = (d) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} };

function deg2rad(d) { return d * (Math.PI / 180); }
function haversine(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = deg2rad(lat2 - lat1), dLon = deg2rad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(mi) {
  if (mi < 0.1) return `${Math.round(mi * 5280)} ft`;
  if (mi < 10) return `${mi.toFixed(1)} mi`;
  return `${Math.round(mi)} mi`;
}
function buildQuery(lat, lng, radiusMi) {
  const radiusM = Math.round(radiusMi * 1609.34);
  return `[out:json][timeout:25]; ( node["brand"="McDonald's"](around:${radiusM},${lat},${lng}); way["brand"="McDonald's"](around:${radiusM},${lat},${lng}); node["amenity"="fast_food"]["name"="McDonald's"](around:${radiusM},${lat},${lng}); ); out center 100;`;
}
function parseElement(el) {
  const lat = el.lat ?? el.center?.lat;
  const lng = el.lon ?? el.center?.lon;
  if (!lat || !lng) return null;
  const t = el.tags || {};
  return {
    id: `${el.type}-${el.id}`,
    name: t.name || "McDonald's",
    address: [t["addr:housenumber"], t["addr:street"]].filter(Boolean).join(" ") || t["addr:full"] || "",
    city: t["addr:city"] || "",
    country: t["addr:country"] || "",
    lat, lng,
    phone: t.phone || t["contact:phone"] || "",
    hours: t.opening_hours || "",
  };
}
function rankLabel(n) {
  if (n === 0) return { label: "Fry Rookie", icon: "🥔" };
  if (n < 5)  return { label: "Fry Explorer", icon: "🍟" };
  if (n < 15) return { label: "Fry Fanatic", icon: "🔥" };
  if (n < 30) return { label: "Fry Legend", icon: "👑" };
  return { label: "Fry Deity", icon: "🏆" };
}

function readExifGPS(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const buf = e.target.result;
        const view = new DataView(buf);
        if (view.getUint16(0) !== 0xFFD8) { resolve(null); return; }
        let offset = 2;
        while (offset < buf.byteLength - 2) {
          const marker = view.getUint16(offset);
          if (marker === 0xFFE1) {
            const exifStr = String.fromCharCode(...new Uint8Array(buf, offset + 4, 6));
            if (exifStr.startsWith("Exif")) {
              const tiffOffset = offset + 10;
              const littleEndian = view.getUint16(tiffOffset) === 0x4949;
              const ifd0 = tiffOffset + view.getUint32(tiffOffset + 4, littleEndian);
              const ifd0Count = view.getUint16(ifd0, littleEndian);
              let gpsIfdOffset = null;
              for (let i = 0; i < ifd0Count; i++) {
                const entryOffset = ifd0 + 2 + i * 12;
                if (view.getUint16(entryOffset, littleEndian) === 0x8825) {
                  gpsIfdOffset = tiffOffset + view.getUint32(entryOffset + 8, littleEndian);
                }
              }
              if (!gpsIfdOffset) { resolve(null); return; }
              const gpsCount = view.getUint16(gpsIfdOffset, littleEndian);
              const gps = {};
              for (let i = 0; i < gpsCount; i++) {
                const e2 = gpsIfdOffset + 2 + i * 12;
                const tag = view.getUint16(e2, littleEndian);
                const valOffset = tiffOffset + view.getUint32(e2 + 8, littleEndian);
                const toRational = (off) => view.getUint32(off, littleEndian) / view.getUint32(off + 4, littleEndian);
                if (tag === 1) gps.latRef = String.fromCharCode(view.getUint8(e2 + 8));
                if (tag === 2) gps.lat = [toRational(valOffset), toRational(valOffset+8), toRational(valOffset+16)];
                if (tag === 3) gps.lngRef = String.fromCharCode(view.getUint8(e2 + 8));
                if (tag === 4) gps.lng = [toRational(valOffset), toRational(valOffset+8), toRational(valOffset+16)];
              }
              if (gps.lat && gps.lng) {
                const dms2dd = ([d,m,s]) => d + m/60 + s/3600;
                let lat = dms2dd(gps.lat); if (gps.latRef === "S") lat = -lat;
                let lng = dms2dd(gps.lng); if (gps.lngRef === "W") lng = -lng;
                resolve({ lat, lng });
              } else { resolve(null); }
            } else { resolve(null); }
            return;
          }
          if ((marker & 0xFF00) !== 0xFF00) break;
          offset += 2 + view.getUint16(offset + 2);
        }
        resolve(null);
      } catch { resolve(null); }
    };
    reader.readAsArrayBuffer(file);
  });
}

  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [userPos, setUserPos] = useState(null);
  const [geoStatus, setGeoStatus] = useState("prompt");
  const [view, setView] = useState("nearby");
  const [search, setSearch] = useState("");
  const [radius, setRadius] = useState(25);
  const [toast, setToast] = useState(null);
  const [celebrating, setCelebrating] = useState(null);
  const [photoProcessing, setPhotoProcessing] = useState(false);
  const [photoResult, setPhotoResult] = useState(null);
  const toastRef = useRef(null);
  const photoInputRef = useRef(null);

  useEffect(() => { saveCheckins(checkins); }, [checkins]);

  const requestGeo = useCallback(() => {
    if (!navigator.geolocation) { setGeoStatus("denied"); return; }
    setGeoStatus("loading");
    navigator.geolocation.getCurrentPosition(
      (pos) => { setUserPos({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setGeoStatus("ok"); },
      () => setGeoStatus("denied"),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }, []);

  useEffect(() => {
    if (!userPos) return;
    let cancelled = false;
    setLoading(true); setLoadError(null);
    const query = buildQuery(userPos.lat, userPos.lng, radius);
    const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
    fetch(url)
      .then(r => { if (!r.ok) throw new Error("Overpass error"); return r.json(); })
      .then(data => {
        if (cancelled) return;
        const locs = data.elements.map(parseElement).filter(Boolean);
        const seen = new Set();
        const deduped = locs.filter(l => {
          const key = `${l.lat.toFixed(4)},${l.lng.toFixed(4)}`;
          if (seen.has(key)) return false; seen.add(key); return true;
        });
        setLocations(deduped); setLoading(false);
      })
      .catch(e => { if (!cancelled) { setLoadError(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [userPos, radius]);

  const withDist = locations.map(l => ({
    ...l, dist: userPos ? haversine(userPos.lat, userPos.lng, l.lat, l.lng) : null,
  })).sort((a, b) => (a.dist ?? 9999) - (b.dist ?? 9999));

  const filtered = withDist.filter(l => {
    if (!search) return true;
    const q = search.toLowerCase();
    return l.name.toLowerCase().includes(q) || l.address.toLowerCase().includes(q) || l.city.toLowerCase().includes(q);
  });

  const handleCheckin = (loc) => {
    const already = checkins[loc.id];
    if (already) {
      setCheckins(prev => { const n = {...prev}; delete n[loc.id]; return n; });
      showToast("Removed check-in", "remove");
    } else {
      setCheckins(prev => ({ ...prev, [loc.id]: { date: new Date().toISOString(), name: loc.name, city: loc.city, address: loc.address, country: loc.country } }));
      setCelebrating(loc.id);
      setTimeout(() => setCelebrating(null), 1200);
      showToast("🍟 Had Fries here!", "success");
    }
  };

  const showToast = (msg, type = "success") => {
    if (toastRef.current) clearTimeout(toastRef.current);
    setToast({ msg, type });
    toastRef.current = setTimeout(() => setToast(null), 2800);
  };

  const handlePhotoUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPhotoProcessing(true);
    setPhotoResult(null);
    const gps = await readExifGPS(file);
    if (!gps) {
      setPhotoResult({ error: "No GPS data found in this photo. Make sure location services were enabled on your camera when you took it." });
      setPhotoProcessing(false);
      return;
    }
    try {
      const query = buildQuery(gps.lat, gps.lng, 2);

      const data = await fetch(url).then(r => r.json());
      const locs = data.elements.map(parseElement).filter(Boolean);
      if (locs.length === 0) {

      const closest = locs.map(l => ({ ...l, dist: haversine(gps.lat, gps.lng, l.lat, l.lng) }))
        .sort((a, b) => a.dist - b.dist)[0];
      setPhotoResult({ loc: closest, gps });

    }

        .hf-stats-tag { color: white; font-size: 0.85rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
        .hf-stats-rank { margin-top: 14px; }
        .hf-rank-chip { display: inline-block; background: #FFC72C; color: #27251F; border: 2.5px solid #27251F; border-radius: 999px; padding: 6px 18px; font-family: 'Archivo Black', sans-serif; font-size: 0.85rem; letter-spacing: 1px; }
        .hf-sgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin-bottom: 16px; }
        .hf-scard { background: white; border: 3px solid #27251F; border-radius: 12px; padding: 16px; text-align: center; }
        .hf-sval { font-family: 'Archivo Black', sans-serif; font-size: 2.2rem; color: #DA0023; line-height: 1; }
        .hf-slbl { font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-top: 3px; }
        .hf-trail-title { font-family: 'Archivo Black', sans-serif; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .hf-trail { background: white; border: 3px solid #27251F; border-radius: 12px; overflow: hidden; }
        .hf-trail-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1.5px solid #f0f0f0; }
        .hf-trail-row:last-child { border-bottom: none; }
        .hf-trail-info { flex: 1; }
        .hf-trail-name { font-weight: 800; font-size: 0.85rem; }
        .hf-trail-loc { color: #888; font-size: 0.7rem; font-weight: 600; }
        .hf-trail-date { font-size: 0.65rem; color: #aaa; font-weight: 600; }
        .hf-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #27251F; color: white; padding: 11px 22px; border-radius: 999px; font-weight: 700; font-size: 0.88rem; border: 3px solid #FFC72C; z-index: 999; transition: transform 0.3s cubic-bezier(.22,1,.36,1); white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
        .hf-toast.show { transform: translateX(-50%) translateY(0); }
        .hf-toast.remove { border-color: #888; }
        .hf-empty { grid-column: 1/-1; text-align: center; padding: 48px 20px; font-family: 'Archivo Black', sans-serif; font-size: 1rem; letter-spacing: 1px; opacity: 0.5; }
        .hf-result-count { max-width: 900px; margin: 8px auto 0; padding: 0 16px; font-size: 0.75rem; font-weight: 700; color: #27251F; opacity: 0.6; letter-spacing: 1px; }
        @media (max-width: 600px) { .hf-title { font-size: 1.1rem; } .hf-stats-big { font-size: 3.5rem; } }
      `}</style>

      <div className="hf-header">
        <div className="hf-header-inner">
          <div className="hf-logo">
            <Arches width={42} />
            <div>
              <div className="hf-title">Had Fries</div>
              <div className="hf-sub">World Fry Tracker</div>
              <div className="hf-disclaimer">Fan app · Not affiliated with McDonald's Corporation</div>
            </div>
          </div>
          <div className="hf-badge">
            <div className="hf-badge-num">{totalCheckins}</div>
            <div className="hf-badge-lbl">Check-ins</div>
          </div>
        </div>
        <div className="hf-nav">
          <div className="hf-nav-inner">
            {[["nearby","📍 Nearby"],["all","📋 All"],["stats","📊 Stats"]].map(([v,l]) => (
              <button key={v} className={`hf-nav-btn${view===v?" active":""}`} onClick={() => setView(v)}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Photo check-in — always visible */}
      <div className="hf-photo-bar">
        <div className="hf-photo-bar-inner">
          <button className="hf-photo-btn" onClick={() => photoInputRef.current?.click()}>📸 Photo Check-in</button>
          <input ref={photoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoUpload} />
          <span className="hf-photo-hint">Upload a photo taken at McDonald's to auto check-in by GPS</span>
        </div>
      </div>

      {geoStatus === "prompt" && view !== "stats" && (
        <div className="hf-geo-banner"><div className="hf-geo-card" style={{marginTop:20}}>
          <div className="hf-geo-icon">🍟</div>
          <div className="hf-geo-title">Find McDonald's Near You</div>
          <div className="hf-geo-desc">Tap the button below to find real McDonald's locations near you, loaded live from OpenStreetMap. No location is shared until you tap.</div>
          <button className="hf-btn-red" onClick={requestGeo}>📍 Use My Location</button>
        </div></div>
      )}
      {geoStatus === "loading" && view !== "stats" && (
        <div className="hf-loading" style={{marginTop:40}}><div className="hf-spinner"/><div className="hf-loading-txt">Getting your location...</div></div>
      )}
      {geoStatus === "denied" && view !== "stats" && (
        <div className="hf-geo-banner"><div className="hf-geo-card" style={{marginTop:20}}>
          <div className="hf-geo-icon">🚫</div>
          <div className="hf-geo-title">Location Access Denied</div>
          <div className="hf-geo-desc">Please enable location permissions in your browser settings, then tap retry.</div>
          <button className="hf-btn-red" onClick={requestGeo}>Retry</button>
        </div></div>
      )}

      {geoStatus === "ok" && view !== "stats" && (
        <div className="hf-controls">
          <div className="hf-controls-inner">
            <input className="hf-search" placeholder="🔍  Search name or address..." value={search} onChange={e => setSearch(e.target.value)} />
            {view === "nearby" && (
              <select className="hf-select" value={radius} onChange={e => setRadius(Number(e.target.value))}>
                <option value={5}>5 mi radius</option>
                <option value={10}>10 mi radius</option>
                <option value={25}>25 mi radius</option>
                <option value={50}>50 mi radius</option>
                <option value={100}>100 mi radius</option>
              </select>
            )}
            <button className="hf-geo-pill" onClick={requestGeo}><span className="hf-geo-dot"/>&nbsp;Update Location</button>
          </div>
        </div>
      )}

      {photoProcessing && (
        <div className="hf-loading" style={{marginTop:20}}><div className="hf-spinner"/><div className="hf-loading-txt">📸 Reading photo location...</div></div>
      )}

      {photoResult && (
        <div className="hf-modal-overlay" onClick={() => setPhotoResult(null)}>
          <div className="hf-modal" onClick={e => e.stopPropagation()}>
            {photoResult.error ? (
              <><div className="hf-modal-icon">😕</div><div className="hf-modal-title">Couldn't Find Location</div><div className="hf-modal-desc">{photoResult.error}</div><button className="hf-btn-red" onClick={() => setPhotoResult(null)}>OK</button></>
            ) : (
              <><div className="hf-modal-icon">📍</div><div className="hf-modal-title">Found It!</div><div className="hf-modal-desc">Your photo was taken near this McDonald's:</div>
              <div className="hf-modal-loc">
                <div className="hf-modal-loc-name">{photoResult.loc.name}</div>
                <div className="hf-modal-loc-addr">{[photoResult.loc.address, photoResult.loc.city].filter(Boolean).join(" · ") || "McDonald's location"}</div>
                <div className="hf-modal-loc-dist">📍 {fmtDist(photoResult.loc.dist)} from photo GPS</div>
              </div>
              {checkins[photoResult.loc.id] ? (
                <><div style={{color:"#DA0023",fontFamily:"'Archivo Black',sans-serif",fontSize:"0.85rem",marginBottom:14}}>🍟 Already checked in here!</div><button className="hf-btn-ghost" onClick={() => setPhotoResult(null)}>Close</button></>
              ) : (
                <div className="hf-modal-btns"><button className="hf-btn-ghost" onClick={() => setPhotoResult(null)}>Cancel</button><button className="hf-btn-red" onClick={() => confirmPhotoCheckin(photoResult.loc)}>✓ Check In!</button></div>
              )}</>
            )}
          </div>
        </div>
      )}

      {loading && geoStatus === "ok" && view !== "stats" && (
        <div className="hf-loading" style={{marginTop:40}}><div className="hf-spinner"/><div className="hf-loading-txt">Loading McDonald's from OpenStreetMap...</div></div>
      )}
      {loadError && !loading && (
        <div style={{maxWidth:900,margin:"20px auto",padding:"0 16px"}}>
          <div style={{background:"white",border:"3px solid #DA0023",borderRadius:12,padding:20,textAlign:"center"}}>
            <div style={{fontSize:"1.5rem",marginBottom:8}}>⚠️</div>
            <div style={{fontFamily:"'Archivo Black',sans-serif",fontSize:"0.9rem",marginBottom:6}}>Couldn't load locations</div>
            <div style={{fontSize:"0.8rem",color:"#666",marginBottom:14}}>The Overpass API may be temporarily busy. Try again.</div>
            <button className="hf-btn-red" onClick={() => {setLocations([]);setLoadError(null);setLoading(true);}}>Retry</button>
          </div>
        </div>
      )}

      {view === "nearby" && geoStatus === "ok" && !loading && !loadError && (
        <>
          {filtered.length > 0 && <div className="hf-result-count">{filtered.length} location{filtered.length!==1?"s":""} found within {radius} miles</div>}
          <div className="hf-grid">
            {filtered.length === 0 && <div className="hf-empty">No McDonald's found nearby 🍟<br/><span style={{fontSize:"0.75rem"}}>Try increasing the radius</span></div>}
            {filtered.map(loc => {
              const isChecked = !!checkins[loc.id];
              return (
                <div key={loc.id} className={`hf-card${isChecked?" checked":""}${celebrating===loc.id?" celebrating":""}`}>
                  {isChecked && <div className="hf-stamp">🍟</div>}
                  <div className="hf-card-top">
                    <div style={{flexShrink:0,display:"flex",alignItems:"center"}}><Arches width={28}/></div>
                    <div className="hf-card-loc-info">
                      <div className="hf-card-name">{loc.name}</div>
                      <div className="hf-card-addr">{loc.address || loc.city || "McDonald's location"}</div>
                    </div>
                    {loc.dist !== null && <div className="hf-dist-pill">{fmtDist(loc.dist)}</div>}
                  </div>
                  <div className="hf-card-bottom">
                    <div className="hf-card-meta">
                      {loc.city && <div>{loc.city}</div>}
                      {loc.hours && <div style={{color:"#4ade80",fontSize:"0.67rem"}}>⏰ {loc.hours.length>30?loc.hours.slice(0,30)+"…":loc.hours}</div>}
                    </div>
                    <button className={`hf-checkin-btn ${isChecked?"yes":"no"}`} onClick={() => handleCheckin(loc)}>
                      {isChecked ? "✓ Had Fries!" : "Had Fries?"}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {view === "all" && geoStatus === "ok" && !loading && !loadError && (
        <div className="hf-list">
          {filtered.length === 0 && <div style={{textAlign:"center",padding:40,fontFamily:"'Archivo Black',sans-serif",opacity:0.5}}>No locations found 🍟</div>}
          {filtered.map(loc => {
            const isChecked = !!checkins[loc.id];
            return (
              <div key={loc.id} className={`hf-list-row${isChecked?" checked":""}`}>
                <ArchesOutline width={22}/>
                <div style={{flex:1,overflow:"hidden"}}>
                  <div className="hf-list-name">{loc.name} {isChecked&&"🍟"}</div>
                  <div className="hf-list-sub">{[loc.address,loc.city].filter(Boolean).join(" · ")||"McDonald's"}</div>
                </div>
                {loc.dist!==null&&<div style={{fontSize:"0.7rem",fontWeight:700,color:"#DA0023",whiteSpace:"nowrap"}}>{fmtDist(loc.dist)}</div>}
                <button className={`hf-checkin-btn ${isChecked?"yes":"no"}`} style={{fontSize:"0.68rem",padding:"6px 11px"}} onClick={() => handleCheckin(loc)}>
                  {isChecked?"✓ Done":"+ Check In"}
                </button>
              </div>
            );
          })}
        </div>
      )}

      {view === "stats" && (
        <div className="hf-stats">
          <div className="hf-stats-hero">
            <div className="hf-stats-big">{totalCheckins}</div>
            <div className="hf-stats-tag">{totalCheckins===1?"Location conquered":totalCheckins===0?"Go get some fries!":"Locations conquered"}</div>
            <div className="hf-stats-rank"><span className="hf-rank-chip">{rank.icon} {rank.label}</span></div>
          </div>
          <div className="hf-sgrid">
            {[
              {val:totalCheckins,lbl:"Check-ins"},
              {val:new Set(Object.values(checkins).map(c=>c.country).filter(Boolean)).size,lbl:"Countries"},
              {val:totalCheckins>0?Math.round((Date.now()-new Date(Object.values(checkins).sort((a,b)=>new Date(a.date)-new Date(b.date))[0]?.date||Date.now()).getTime())/86400000):0,lbl:"Days Active"},
              {val:rank.icon,lbl:rank.label},
            ].map(s=>(
              <div key={s.lbl} className="hf-scard"><div className="hf-sval">{s.val}</div><div className="hf-slbl">{s.lbl}</div></div>
            ))}
          </div>
          {totalCheckins>0?(
            <><div className="hf-trail-title">🍟 Your Fry Trail</div>
            <div className="hf-trail">
              {Object.entries(checkins).slice().reverse().map(([id,c])=>(
                <div key={id} className="hf-trail-row">
                  <ArchesOutline width={22}/>
                  <div className="hf-trail-info">
                    <div className="hf-trail-name">{c.name||"McDonald's"}</div>
                    <div className="hf-trail-loc">{[c.address,c.city].filter(Boolean).join(" · ")||"—"}</div>
                  </div>
                  <div className="hf-trail-date">{new Date(c.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                </div>
              ))}
            </div></>
          ):(
            <div style={{background:"white",border:"3px solid #27251F",borderRadius:12,padding:32,textAlign:"center"}}>
              <div style={{fontSize:"3rem",marginBottom:10}}>🍟</div>
              <div style={{fontFamily:"'Archivo Black',sans-serif",fontSize:"1rem"}}>No check-ins yet!</div>
              <div style={{color:"#888",fontSize:"0.82rem",marginTop:6,fontWeight:600}}>Head to Nearby to start your fry journey.</div>
            </div>
          )}
          <div style={{marginTop:24,padding:"12px 16px",background:"rgba(0,0,0,0.08)",borderRadius:8,fontSize:"0.62rem",color:"rgba(39,37,31,0.55)",fontWeight:600,lineHeight:1.6,textAlign:"center"}}>
            Had Fries is an unofficial personal family app and is not affiliated with, endorsed by, or connected to McDonald's Corporation. The McDonald's name and Golden Arches logo are registered trademarks of McDonald's Corporation. Location data sourced from OpenStreetMap contributors under the ODbL license.
          </div>
        </div>
      )}

      <div className={`hf-toast${toast?" show":""}${toast?.type==="remove"?" remove":""}`}>{toast?.msg}</div>
    </div>
  );
}

root.render(<HadFries />);
